<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📺 Lista IPTV</title>
    <style>
        body { font-family: Arial; max-width: 800px; margin: 30px auto; padding: 20px; background: #0d0d0d; color: #fff; }
        h1 { color: #1a73e8; }
        .canal { background: #1a1a1a; padding: 10px 15px; margin: 5px 0; border-radius: 8px; display: flex; justify-content: space-between; }
        .canal a { color: #4fc3f7; text-decoration: none; }
        .box { background: #222; padding: 20px; border-radius: 12px; margin-top: 20px; text-align: center; }
        .box iframe { width: 100%; height: 400px; border: none; border-radius: 8px; }
        .btn { display: inline-block; background: #1a73e8; color: #fff; padding: 12px 24px; border-radius: 8px; text-decoration: none; margin-top: 15px; }
        .btn:hover { background: #1557b0; }
        .footer { margin-top: 30px; color: #888; font-size: 13px; text-align: center; }
    </style>
</head>
<body>
    <h1>📺 Lista IPTV</h1>

    <div class="box">
        <h2>⚽ Sport TV 5 (Player Web)</h2>
        <iframe src="http://tvdesporto.live/play.php?canal=sporttv5" allowfullscreen></iframe>
    </div>

    <h2>📋 Lista de Canais</h2>
    <div id="canais"></div>

    <div style="text-align:center; margin-top:20px;">
        <a href="canais.m3u" class="btn">📥 Baixar lista M3U</a>
        <a href="https://raw.githubusercontent.com/u0672842490-pixml/lista-iptv/main/canais.m3u" class="btn" style="background:#34a853;">🔗 Copiar URL</a>
    </div>

    <div class="footer">
        🔄 Lista atualizada em: <span id="data"></span>
    </div>

    <script>
        const canais = [
            "RTP 1", "RTP 2", "SIC", "TVI", "RTP 1 HD",
            "Secret Story 5", "ETV HD", "SIC Mulher", "SIC Radical",
            "+TVI", "SIC Caras", "Canal Q", "Porto Canal",
            "RTP Memória", "RTP África", "RTP Madeira", "RTP Açores",
            "AR TV", "Sport TV 1 HD", "Sport TV 2 HD", "Sport TV 4 HD",
            "Sport TV 1", "Sport TV 2", "Sport TV 3", "Sport TV 4",
            "Sport TV 5", "BTV 1", "BTV 2 HD", "BTV 2"
        ];

        const container = document.getElementById('canais');
        canais.forEach(nome => {
            const div = document.createElement('div');
            div.className = 'canal';
            div.innerHTML = <span>📺 ${nome}</span><a href="canais.m3u">Ver na lista</a>;
            container.appendChild(div);
        });

        document.getElementById('data').textContent = new Date().toLocaleDateString('pt-PT');
    </script>
</body>
</html>
